<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kehaiアプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app-container">
        
        <h1>Kehai.</h1>

        <div class="tab-container" style="display: flex; justify-content: space-around; background: rgba(255,255,255,0.8); padding: 10px 0; border-bottom: 1px solid #ddd; margin-bottom: 15px; border-radius: 8px 8px 0 0;">
            <button id="tab-my" onclick="switchTab('my')" style="flex: 1; background: none; border: none; font-size: 1rem; font-weight: bold; color: #4caf50; cursor: pointer; padding: 10px 0; border-bottom: 3px solid #4caf50; transition: all 0.3s;">じぶん 👤</button>
            <button id="tab-partner" onclick="switchTab('partner')" style="flex: 1; background: none; border: none; font-size: 1rem; font-weight: bold; color: #888; cursor: pointer; padding: 10px 0; border-bottom: 3px solid transparent; transition: all 0.3s;">あいて 👥</button>
        </div>

        <section id="partner-area" style="display: block; padding-top: 20px; min-height: 480px; box-sizing: border-box;">
            <h2>あいて のいま</h2>
            <div style="text-align: center; margin: 15px 0;">
                <img id="partner-avatar" src="image/woman1.png" alt="相手のキャラ" onclick="zoomPhoto(this)" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #4caf50; cursor: zoom-in; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            </div>
            <p style="font-size: 0.9rem; color: #888; font-weight: bold; margin-top: 8px; text-align: center;">あいてのいま</p>
            
            <p id="partner-message" style="font-size: 1.1rem; font-weight: bold; color: #333; text-align: center; margin-top: 10px; background: #f0f0f0; padding: 12px 20px; border-radius: 15px; display: inline-block; min-width: 260px; max-width: 90%; margin-left: 50%; transform: translateX(-50%); box-sizing: border-box;">いまなにしてるかな？</p>
            
            <div id="effect-layer"></div>
        </section>
        <section id="my-area" style="display: none;">
            
            <h2>じぶんのアバター（タップして変更）</h2>
            <div style="text-align: center; margin: 15px 0;">
                <img id="my-avatar-preview" src="image/woman1.png" alt="自分自身のアバター" onclick="openAvatarModal()" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #4caf50; cursor: pointer; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">本日あと <span id="upload-count">3</span> 回変更できます</p>

                <p style="font-size: 0.9rem; color: #4caf50; font-weight: bold; margin-top: 8px;">いまのあなた：<span id="my-current-status">未設定</span></p>
            </div>
            
            <h2>いまの気配を伝える（エフェクト付き！）</h2>
            <div class="status-buttons" style="display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;">
                <button onclick="changeStatus('🏠 今家でまったり中')">🏠 まったり</button>
                <button onclick="changeStatus('🔥 仕事頑張ってる！')">🔥 仕事がんばる</button>
                <button onclick="changeStatus('💻 パソコンにかじりつき')">💻 パソコン</button>
                <button onclick="changeStatus('🍰 おやつタイム☕️')">🍰 おやつ</button>
                <button onclick="changeStatus('🌙 これから寝るね、おやすみ')">🌙 寝るね</button>
                <button onclick="changeStatus('❤️ 愛してる')">❤️ 愛してる</button>
                <button onclick="changeStatus('✨ 大好き')">✨ 大好き</button>

            </div>

            <div class="message-input">
                <input type="text" id="my-message-text" placeholder="自由に入力して送信もできるよ">
                <button onclick="sendStatus()">送信</button>
            </div>

           
                    </section>

    </div>

   <div id="avatar-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
        <div style="background-color: white; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-align: center;">
            <h3 style="margin-bottom: 15px; text-align: center; color: #333;">アバターを変更</h3>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <input type="file" id="avatar-file-input" accept="image/*" style="display: none;" onchange="uploadOwnPhoto(this)">
                <button onclick="document.getElementById('avatar-file-input').click()" style="background-color: #2196f3; box-shadow: 0 3px 0 #0b7dda; width: 100%;">📸 自分の写真を直接設定する</button>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

            <div style="margin-bottom: 10px;">
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 8px;">または用意されたキャラから選ぶ：</p>
                <button id="toggle-custom-mode" onclick="toggleCustomMode()" style="background-color: #888; box-shadow: 0 3px 0 #666; font-size: 0.8rem; padding: 6px 12px; border-radius: 20px; color: white; cursor: pointer; font-weight: bold;">⚙️ 6つの枠の写真をカスタムする</button>
            </div>

            <div id="preset-avatar-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; justify-items: center;">
                
                <div class="avatar-preset-container" onclick="handleAvatarClick(1, 'woman1')" style="width: 100%;">
                    <img id="preset-img-1" src="image/woman1.png" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee; aspect-ratio: 1/1; object-fit: cover;">
                    <div class="avatar-custom-overlay">📷変更</div>
                </div>

                <div class="avatar-preset-container" onclick="handleAvatarClick(2, 'woman2')" style="width: 100%;">
                    <img id="preset-img-2" src="image/woman2.png" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee; aspect-ratio: 1/1; object-fit: cover;">
                    <div class="avatar-custom-overlay">📷変更</div>
                </div>

                <div class="avatar-preset-container" onclick="handleAvatarClick(3, 'woman3')" style="width: 100%;">
                    <img id="preset-img-3" src="image/woman3.png" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee; aspect-ratio: 1/1; object-fit: cover;">
                    <div class="avatar-custom-overlay">📷変更</div>
                </div>

                <div class="avatar-preset-container" onclick="handleAvatarClick(4, 'man1')" style="width: 100%;">
                    <img id="preset-img-4" src="image/man1.png" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee; aspect-ratio: 1/1; object-fit: cover;">
                    <div class="avatar-custom-overlay">📷変更</div>
                </div>

                <div class="avatar-preset-container" onclick="handleAvatarClick(5, 'man2')" style="width: 100%;">
                    <img id="preset-img-5" src="image/man2.png" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee; aspect-ratio: 1/1; object-fit: cover;">
                    <div class="avatar-custom-overlay">📷変更</div>
                </div>

                <div class="avatar-preset-container" onclick="handleAvatarClick(6, 'man3')" style="width: 100%;">
                    <img id="preset-img-6" src="image/man3.png" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee; aspect-ratio: 1/1; object-fit: cover;">
                    <div class="avatar-custom-overlay">📷変更</div>
                </div>

            </div>
            
            <button onclick="closeAvatarModal()" style="background-color: #9e9e9e; box-shadow: 0 3px 0 #757575; width: 100%;">閉じる</button>
        </div>
    </div>
    </div>

    <div id="photo-zoom-modal" onclick="closeZoomModal()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out;">
        <img id="zoomed-photo" src="" alt="拡大写真" style="max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); object-fit: contain;">
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
