<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふたりの気配アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="effect-layer"></div>

        <div id="partner-area">
            <h2>相手 のいま</h2>
            <div class="avatar-container" style="text-align: center; margin: 10px 0;">
                <img id="partner-avatar" src="image/woman2.png" alt="相手のアバター" onerror="this.src='https://placehold.co/100x100?text=Partner'" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
            </div>
            <div class="bubble">
                <p id="partner-message">接続を待っているよ...</p>
            </div>
        </div>

        <hr>

        <div id="my-area" style="text-align: center;">
            
            <div class="avatar-container" onclick="openAvatarModal()" style="cursor: pointer; position: relative; margin: 10px auto; width: 100px;">
                <img id="my-avatar-preview" src="image/woman1.png" alt="自分のアバター" onerror="this.src='https://placehold.co/100x100?text=Me'" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
                <div class="edit-overlay" style="position: absolute; bottom: 0; background: rgba(0,0,0,0.5); color: white; width: 100%; font-size: 0.8rem; border-bottom-left-radius: 50%; border-bottom-right-radius: 50%;">変更</div>
            </div>
            
            <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">本日あと <span id="upload-count">3</span> 回変更できます</p>
            <p style="font-size: 0.9rem; color: #4caf50; font-weight: bold; margin-top: 5px;">いまのあなた：<span id="my-current-status">未設定</span></p>

            <div class="status-buttons">
                <button onclick="changeStatus('🏠 今家でまったり中')">☕️ まったり</button>
                <button onclick="changeStatus('🔥 工作頑張ってる！')">💪 お仕事</button>
                <button onclick="changeStatus('💻 パソコンに集中⚡️')">💻 PC中</button>
                <button onclick="changeStatus('🍰 おやつタイム🧋')">🍰 おやつ</button>
                <button onclick="changeStatus('🌙 もう寝るね〜💤')">🌙 寝るね</button>
                <button onclick="changeStatus('❤️ 愛してるよー！')">❤️ 愛してる</button>
                <button onclick="changeStatus('💖 いつも大好き！')">💖 大好き</button>
            </div>

            <div class="message-input-area" style="margin-top: 15px;">
                <input type="text" id="my-message-text" placeholder="今の気持ちを自由に書いてね">
                <button onclick="sendStatus()">送信</button>
            </div>
            
            <div style="margin-top: 15px;">
                <label for="bg-photo-input" style="background-color: #f0f0f0; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; border: 1px solid #ccc;">🖼️ 背景写真を変える</label>
                <input type="file" id="bg-photo-input" accept="image/*" onchange="uploadBackground()" style="display: none;">
            </div>

            <div style="margin-top: 25px; margin-bottom: 10px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; display: inline-block;">
                <input type="text" id="my-name-input" placeholder="あなたの名前" style="padding: 6px; width: 120px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem;">
                <button onclick="changeMyName()" style="padding: 6px 12px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; font-weight: bold; margin-left: 5px;">名前を変更</button>
            </div>

        </div>
    </div>

    <div id="avatar-modal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:100;">
        <div class="modal-content" style="background:white; padding:20px; border-radius:8px; text-align:center;">
            <h3>アバターを選んでね</h3>
            <div class="preset-avatars" style="display: flex; gap: 10px; justify-content: center;">
                <img src="image/woman1.png" alt="1" onclick="selectPresetAvatar('woman1')" style="width:60px; height:60px; border-radius:50%; cursor:pointer; object-fit:cover;">
                <img src="image/woman2.png" alt="2" onclick="selectPresetAvatar('woman2')" style="width:60px; height:60px; border-radius:50%; cursor:pointer; object-fit:cover;">
                <img src="image/woman3.png" alt="3" onclick="selectPresetAvatar('woman3')" style="width:60px; height:60px; border-radius:50%; cursor:pointer; object-fit:cover;">
            </div>
            <div style="margin-top: 20px;">
                <label for="avatar-file-input" style="background-color: #4CAF50; color: white; padding: 8px 15px; border-radius: 4px; cursor: pointer;">📸 写真をアップロード</label>
                <input type="file" id="avatar-file-input" accept="image/*" onchange="uploadMyAvatarPhoto()" style="display: none;">
            </div>
            <button onclick="closeAvatarModal()" style="margin-top: 20px; background: #aaa; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">閉じる</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
