<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふたりの気配アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="effect-layer"></div>

        <div id="partner-area">
            <h2>相手 のいま</h2>
            <div class="avatar-container">
                <img id="partner-avatar" src="image/default.png" alt="相手のアバター">
            </div>
            <div class="bubble">
                <p id="partner-message">接続を待っているよ...</p>
            </div>
        </div>

        <hr>

        <div id="my-area">
            <div style="margin-bottom: 15px; background: rgba(255,255,255,0.8); padding: 8px; border-radius: 8px;">
                <input type="text" id="my-name-input" placeholder="あなたの名前" style="padding: 5px; width: 120px; border: 1px solid #ccc; border-radius: 4px;">
                <button onclick="changeMyName()" style="padding: 5px 10px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer;">名前を変更</button>
            </div>

            <div class="avatar-container" onclick="openAvatarModal()">
                <img id="my-avatar-preview" src="image/default.png" alt="自分のアバター">
                <div class="edit-overlay">変更</div>
            </div>
            
            <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">本日あと <span id="upload-count">3</span> 回変更できます</p>
            <p style="font-size: 0.9rem; color: #4caf50; font-weight: bold; margin-top: 8px;">いまのあなた：<span id="my-current-status">未設定</span></p>

            <div class="status-buttons">
                <button onclick="changeStatus('🏠 今家でまったり中')">☕️ まったり</button>
                <button onclick="changeStatus('🔥 仕事頑張ってる！')">💪 お仕事</button>
                <button onclick="changeStatus('💻 パソコンに集中⚡️')">💻 PC中</button>
                <button onclick="changeStatus('🍰 おやつタイム🧋')">🍰 おやつ</button>
                <button onclick="changeStatus('🌙 もう寝るね〜💤')">🌙 寝るね</button>
                <button onclick="changeStatus('❤️ 愛してるよー！')">❤️ 愛してる</button>
                <button onclick="changeStatus('💖 いつも大好き！')">💖 大好き</button>
            </div>

            <div class="message-input-area">
                <input type="text" id="my-message-text" placeholder="今の気持ちを自由に書いてね">
                <button onclick="sendStatus()">送信</button>
            </div>
            
            <div style="margin-top: 15px;">
                <label for="bg-photo-input" style="background-color: #f0f0f0; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">🖼️ 背景写真を変える</label>
                <input type="file" id="bg-photo-input" accept="image/*" onchange="uploadBackground()" style="display: none;">
            </div>
        </div>
    </div>

    <div id="avatar-modal" class="modal">
        <div class="modal-content">
            <h3>アバターを選んでね</h3>
            <div class="preset-avatars">
                <img src="image/avatar1.png" alt="1" onclick="selectPresetAvatar('avatar1')">
                <img src="image/avatar2.png" alt="2" onclick="selectPresetAvatar('avatar2')">
                <img src="image/avatar3.png" alt="3" onclick="selectPresetAvatar('avatar3')">
            </div>
            <div style="margin-top: 20px;">
                <label for="avatar-file-input" style="background-color: #4CAF50; color: white; padding: 8px 15px; border-radius: 4px; cursor: pointer;">📸 写真をアップロード</label>
                <input type="file" id="avatar-file-input" accept="image/*" onchange="uploadMyAvatarPhoto()" style="display: none;">
            </div>
            <button onclick="closeAvatarModal()" style="margin-top: 20px; background: #aaa; color: white; border: none; padding: 5px 10px; border-radius: 4px;">閉じる</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
